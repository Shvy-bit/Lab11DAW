<div class="card main">
    <h2 class="center">Login JWT</h2>
    
    <form #loginForm="ngForm" class="center form" (submit)="login(loginForm)">
        <input
        type="text"
        placeholder="Usuario"
        ngModel
        name="username"
        required>
        
        <input
        type="password"
        placeholder="Contraseña"
        ngModel
        name="password"
        required>
        
        <button type="submit">
            Iniciar Sesion
        </button>
    </form>
</div>
